<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统概览 - 管理控制台</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- ECharts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.2/echarts.min.js"></script>
    <style>
        :root {
            --bg-color: #f1f5f9; /* 浅雅致灰蓝 */
            --card-bg: rgba(255, 255, 255, 0.72); /* 白底半透明毛玻璃 */
            --card-border: rgba(255, 255, 255, 0.65); /* 亮白色卡片边框 */
            --inner-border: rgba(15, 23, 42, 0.08); /* 内部划分浅边框 */
            --text-primary: #0f172a; /* 极深石板灰 */
            --text-secondary: #64748b; /* 灰蓝色 */
            --primary: #2563eb; /* 皇家宝蓝色 */
            --primary-glow: rgba(37, 99, 235, 0.08);
            --success: #10b981; /* 极佳青翠绿 */
            --success-glow: rgba(16, 185, 129, 0.08);
            --warning: #f59e0b; /* 琥珀金黄 */
            --warning-glow: rgba(245, 158, 11, 0.08);
            --danger: #ef4444; /* 珊瑚绯红 */
            --danger-glow: rgba(239, 68, 68, 0.08);
            --purple: #8b5cf6; /* 紫罗兰 */
            --purple-glow: rgba(139, 92, 246, 0.08);
            --cyan: #0ea5e9; /* 天空湛蓝 */
            --cyan-glow: rgba(14, 165, 233, 0.08);
            --orange: #f97316; /* 橙红 */
            --orange-glow: rgba(249, 115, 22, 0.08);
            --accent: #6366f1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 40px 24px;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(37, 99, 235, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 10%, rgba(139, 92, 246, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 50% 80%, rgba(16, 185, 129, 0.03) 0%, transparent 50%);
            background-attachment: fixed;
            overflow-x: hidden;
        }

        /* 顶部毛玻璃导航头 */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding: 24px 32px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid var(--card-border);
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04);
            animation: fadeInDown 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .header-title-block {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary), var(--cyan));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #fff;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.2);
        }

        .header-title {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #0f172a, #475569);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        /* 时间段选择按钮 */
        .range-selector {
            background: rgba(15, 23, 42, 0.04);
            border: 1px solid rgba(15, 23, 42, 0.05);
            padding: 4px;
            border-radius: 14px;
            display: flex;
            gap: 4px;
        }

        .range-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .range-btn.active {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .range-btn:hover:not(.active) {
            color: var(--text-primary);
            background: rgba(15, 23, 42, 0.04);
        }

        .refresh-btn {
            background: rgba(15, 23, 42, 0.04);
            border: 1px solid rgba(15, 23, 42, 0.05);
            color: var(--text-primary);
            width: 40px;
            height: 40px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .refresh-btn:hover {
            background: rgba(15, 23, 42, 0.08);
            border-color: rgba(15, 23, 42, 0.1);
            transform: rotate(180deg);
        }

        /* 核心指标卡片布局 */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card-wrapper {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.03);
        }

        .stat-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at right bottom, var(--glow-color, rgba(37, 99, 235, 0.02)) 0%, transparent 60%);
            pointer-events: none;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--hover-border, rgba(37, 99, 235, 0.25));
            box-shadow: 0 15px 30px rgba(15, 23, 42, 0.08), 0 0 15px var(--glow-color, rgba(37, 99, 235, 0.03));
        }

        .stat-card-icon {
            width: 60px;
            height: 60px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #fff;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.08);
            flex-shrink: 0;
        }

        .stat-card-info {
            flex-grow: 1;
            min-width: 0;
        }

        .stat-card-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .stat-card-value {
            font-family: 'Outfit', sans-serif;
            font-size: 32px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-primary);
        }

        .stat-card-desc {
            font-size: 11px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stat-card-desc i {
            color: var(--success);
        }

        /* 进度条板块 */
        .progress-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        .progress-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 20px 24px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.03);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .progress-card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .progress-card-icon {
            font-size: 16px;
        }

        .progress-card-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-secondary);
        }

        .progress-card-value {
            font-family: 'Outfit', sans-serif;
            font-size: 26px;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background: rgba(15, 23, 42, 0.06);
            border-radius: 999px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 999px;
            transition: width 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 包含图表的卡片 */
        .chart-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        .chart-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 12px 40px rgba(15, 23, 42, 0.03);
            display: flex;
            flex-direction: column;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .chart-card-title-block {
            margin-bottom: 20px;
        }

        .chart-card-title {
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .chart-card-subtitle {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .chart-wrapper {
            width: 100%;
            height: 340px;
        }

        .pie-layout {
            display: flex;
            flex-direction: column;
            gap: 16px;
            height: 100%;
        }

        .pie-chart-wrapper {
            width: 100%;
            height: 180px;
        }

        /* 模型占比排行列表 */
        .ranking-panel {
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
            flex-grow: 1;
        }

        .ranking-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.02);
            border: 1px solid rgba(15, 23, 42, 0.04);
            transition: all 0.2s ease;
        }

        .ranking-item:hover {
            background: rgba(15, 23, 42, 0.04);
            border-color: rgba(15, 23, 42, 0.08);
            transform: translateX(4px);
        }

        .ranking-left {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .ranking-index {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 800;
            color: #fff;
            flex-shrink: 0;
        }

        .ranking-name {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .ranking-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .ranking-count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .ranking-ratio {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-secondary);
            min-width: 36px;
            text-align: right;
        }

        /* 详细统计表格模块 */
        .table-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 12px 40px rgba(15, 23, 42, 0.03);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .table-header-block {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .table-container {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            padding: 14px 16px;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--inner-border);
            background: rgba(15, 23, 42, 0.02);
        }

        td {
            padding: 14px 16px;
            font-size: 13px;
            color: var(--text-primary);
            border-bottom: 1px solid rgba(15, 23, 42, 0.04);
            white-space: nowrap;
        }

        tr {
            transition: background-color 0.2s ease;
        }

        tr:hover td {
            background: rgba(37, 99, 235, 0.03);
        }

        /* 标签设计 */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }

        .badge-date {
            color: var(--primary);
            background: rgba(37, 99, 235, 0.08);
        }

        .badge-total {
            color: var(--primary);
            background: rgba(37, 99, 235, 0.08);
        }

        .badge-success {
            color: var(--success);
            background: rgba(16, 185, 129, 0.08);
        }

        .badge-danger {
            color: var(--danger);
            background: rgba(239, 68, 68, 0.08);
        }

        .badge-neutral {
            color: var(--text-secondary);
            background: rgba(15, 23, 42, 0.05);
        }

        .badge-input {
            color: var(--purple);
            background: rgba(139, 92, 246, 0.08);
        }

        .badge-output {
            color: var(--orange);
            background: rgba(249, 115, 22, 0.08);
        }

        .badge-tokens {
            color: #b45309; /* 棕色 */
            background: rgba(251, 191, 36, 0.1);
            box-shadow: inset 0 0 0 1px rgba(251, 191, 36, 0.15);
        }

        /* 动画关键帧 */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .animate-pulse {
            animation: pulse 2s infinite ease-in-out;
        }

        /* 移动端与平板响应式适配 */
        @media (max-width: 1200px) {
            .stat-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .progress-grid {
                grid-template-columns: 1fr;
            }
            .chart-layout {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 20px 16px;
            }
            .dashboard-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
                padding: 20px;
            }
            .header-actions {
                width: 100%;
                justify-content: space-between;
            }
            .stat-grid {
                grid-template-columns: 1fr;
            }
            .stat-card {
                padding: 20px;
            }
            .chart-wrapper {
                height: 280px;
            }
            .pie-chart-wrapper {
                height: 180px;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部状态栏 -->
    <header class="dashboard-header">
        <div class="header-title-block">
            <div class="header-icon">
                <i class="fa-solid fa-chart-line animate-pulse"></i>
            </div>
            <div>
                <h1 class="header-title">系统分析仪表盘</h1>
                <p class="header-subtitle">实时运营数据与模型调用指标分析 (静态演示版)</p>
            </div>
        </div>
        <div class="header-actions">
            <div class="range-selector">
                <button class="range-btn" onclick="switchRange('today')">今日</button>
                <button class="range-btn active" onclick="switchRange('7d')">近 7 天</button>
                <button class="range-btn" onclick="switchRange('30d')">近 30 天</button>
            </div>
            <button class="refresh-btn" onclick="triggerRefresh()" title="重新加载数据">
                <i class="fa-solid fa-arrows-rotate"></i>
            </button>
        </div>
    </header>

    <!-- 核心指标卡片 -->
    <section class="stat-grid">
        <div class="stat-card-wrapper" style="animation-delay: 0s">
            <div class="stat-card" style="--glow-color: rgba(59, 130, 246, 0.08); --hover-border: rgba(59, 130, 246, 0.2);">
                <div class="stat-card-icon" style="background: linear-gradient(135deg, #3b82f6, #1d4ed8);">
                    <i class="fa-solid fa-users"></i>
                </div>
                <div class="stat-card-info">
                    <p class="stat-card-title">用户总数</p>
                    <h2 class="stat-card-value" id="total-users">1,471</h2>
                    <p class="stat-card-desc"><i class="fa-solid fa-user-plus"></i> 平台注册用户</p>
                </div>
            </div>
        </div>

        <div class="stat-card-wrapper" style="animation-delay: 0.08s">
            <div class="stat-card" style="--glow-color: rgba(249, 115, 22, 0.08); --hover-border: rgba(249, 115, 22, 0.25);">
                <div class="stat-card-icon" style="background: linear-gradient(135deg, #f97316, #e11d48);">
                    <i class="fa-solid fa-server"></i>
                </div>
                <div class="stat-card-info">
                    <p class="stat-card-title">启用渠道</p>
                    <h2 class="stat-card-value" id="enabled-channels">10 / 25</h2>
                    <p class="stat-card-desc"><i class="fa-solid fa-heart-pulse" id="healthy-icon"></i> <span id="healthy-desc">6 个健康运行</span></p>
                </div>
            </div>
        </div>

        <div class="stat-card-wrapper" style="animation-delay: 0.16s">
            <div class="stat-card" style="--glow-color: rgba(16, 185, 129, 0.08); --hover-border: rgba(16, 185, 129, 0.2);">
                <div class="stat-card-icon" style="background: linear-gradient(135deg, #10b981, #059669);">
                    <i class="fa-solid fa-cubes"></i>
                </div>
                <div class="stat-card-info">
                    <p class="stat-card-title">模型总数</p>
                    <h2 class="stat-card-value" id="total-models">19</h2>
                    <p class="stat-card-desc"><i class="fa-solid fa-circle-check"></i> 当前启用模型</p>
                </div>
            </div>
        </div>

        <div class="stat-card-wrapper" style="animation-delay: 0.24s">
            <div class="stat-card" style="--glow-color: rgba(139, 92, 246, 0.08); --hover-border: rgba(139, 92, 246, 0.25);">
                <div class="stat-card-icon" style="background: linear-gradient(135deg, #8b5cf6, #6366f1);">
                    <i class="fa-solid fa-bolt"></i>
                </div>
                <div class="stat-card-info">
                    <p class="stat-card-title">今日请求</p>
                    <h2 class="stat-card-value" id="today-requests">75,464</h2>
                    <p class="stat-card-desc"><i class="fa-solid fa-chart-bar"></i> 今日累计调用量</p>
                </div>
            </div>
        </div>
    </section>

    <!-- 进度与率值展示 -->
    <section class="progress-grid">
        <div class="progress-card" style="animation-delay: 0.3s">
            <div class="progress-card-header">
                <i class="fa-solid fa-microchip progress-card-icon" style="color: var(--primary);"></i>
                <span class="progress-card-title">今日 Token 消耗</span>
            </div>
            <div class="progress-card-value" id="today-tokens">3,692,589,101</div>
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="token-bar" style="width: 82%; background: linear-gradient(to right, var(--primary), var(--cyan));"></div>
            </div>
        </div>

        <div class="progress-card" style="animation-delay: 0.38s">
            <div class="progress-card-header">
                <i class="fa-solid fa-circle-check progress-card-icon" style="color: var(--success);"></i>
                <span class="progress-card-title">接口成功率</span>
            </div>
            <div class="progress-card-value" id="success-rate">69.6%</div>
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="success-bar" style="width: 69.6%; background: linear-gradient(to right, var(--success), #a7f3d0);"></div>
            </div>
        </div>

        <div class="progress-card" style="animation-delay: 0.46s">
            <div class="progress-card-header">
                <i class="fa-solid fa-triangle-exclamation progress-card-icon" style="color: var(--danger);"></i>
                <span class="progress-card-title">今日错误数</span>
            </div>
            <div class="progress-card-value" id="today-errors" style="color: var(--danger);">22,903</div>
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="error-bar" style="width: 30.4%; background: linear-gradient(to right, var(--danger), #fecaca);"></div>
            </div>
        </div>
    </section>

    <!-- 图表分析栏 -->
    <section class="chart-layout">
        <!-- 请求趋势 -->
        <div class="chart-card" style="animation-delay: 0.52s">
            <div class="chart-card-title-block">
                <h3 class="chart-card-title" id="trend-title">请求趋势（近 7 天）</h3>
                <p class="chart-card-subtitle">图表和表格使用同一统计口径</p>
            </div>
            <div class="chart-wrapper" id="request-chart"></div>
        </div>

        <!-- 模型比例 -->
        <div class="chart-card" style="animation-delay: 0.6s">
            <div class="chart-card-title-block">
                <h3 class="chart-card-title">模型使用比率</h3>
                <p class="chart-card-subtitle">按请求量统计模型调用占比</p>
            </div>
            <div class="pie-layout">
                <div class="pie-chart-wrapper" id="model-chart"></div>
                <div class="ranking-panel" id="ranking-list">
                    <!-- JavaScript 动态填充 -->
                </div>
            </div>
        </div>
    </section>

    <!-- 详细统计表格 -->
    <section class="table-card" style="animation-delay: 0.68s">
        <div class="table-header-block">
            <div>
                <h3 class="chart-card-title">详细统计数据</h3>
                <p class="chart-card-subtitle" id="table-subtitle">按近7天每日聚合统计</p>
            </div>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>时间</th>
                        <th>总请求数</th>
                        <th>成功数</th>
                        <th>失败数</th>
                        <th>输入 Token</th>
                        <th>输出 Token</th>
                        <th>总 Token</th>
                    </tr>
                </thead>
                <tbody id="stats-table-body">
                    <!-- JavaScript 动态填充 -->
                </tbody>
            </table>
        </div>
    </section>

    <script>
        // 定义颜色系统（配合亮色主题进行高对比与协调优化）
        const MODEL_COLORS = ['#2563eb', '#0ea5e9', '#10b981', '#f59e0b', '#8b5cf6', '#ef4444', '#64748b'];

        // 静态数据定义
        const DASHBOARD_DATA = {
            total_users: 1471,
            total_channels: 25,
            enabled_channels: 10,
            healthy_channels: 6,
            total_models: 19,
            today_requests: 75581,
            today_tokens: 3698282278,
            today_errors: 238,
            model_usage_ratio: [
                { model_name: "gpt-5.5", request_count: 169414, total_tokens: 11623065739, ratio: 41.9 },
                { model_name: "claude-opus-4-7", request_count: 111624, total_tokens: 8114527177, ratio: 27.6 },
                { model_name: "gpt-5.4", request_count: 30142, total_tokens: 1002358486, ratio: 7.4 },
                { model_name: "gpt-5.4-mini", request_count: 22091, total_tokens: 576400139, ratio: 5.5 },
                { model_name: "claude-opus-4-6", request_count: 19747, total_tokens: 1290112118, ratio: 4.9 },
                { model_name: "claude-opus-4-8", request_count: 13763, total_tokens: 1165979789, ratio: 3.4 },
                { model_name: "其他", request_count: 37892, total_tokens: 1175635062, ratio: 9.4 }
            ]
        };

        const STATS_DATA = [
            { bucket_key: "2026-05-27", date: "2026-05-27", label: "2026-05-27", total_requests: 46064, success_requests: 45908, failed_requests: 156, total_input_tokens: 695575552, total_output_tokens: 29066695, total_tokens: 3181563079 },
            { bucket_key: "2026-05-28", date: "2026-05-28", label: "2026-05-28", total_requests: 43110, success_requests: 42898, failed_requests: 212, total_input_tokens: 498416734, total_output_tokens: 31004004, total_tokens: 3420359874 },
            { bucket_key: "2026-05-29", date: "2026-05-29", label: "2026-05-29", total_requests: 53185, success_requests: 52905, failed_requests: 280, total_input_tokens: 549349521, total_output_tokens: 35167995, total_tokens: 4012899212 },
            { bucket_key: "2026-05-30", date: "2026-05-30", label: "2026-05-30", total_requests: 47784, success_requests: 47666, failed_requests: 118, total_input_tokens: 555738059, total_output_tokens: 33121652, total_tokens: 3585747519 },
            { bucket_key: "2026-05-31", date: "2026-05-31", label: "2026-05-31", total_requests: 80831, success_requests: 80567, failed_requests: 264, total_input_tokens: 414890763, total_output_tokens: 37307638, total_tokens: 3397579614 },
            { bucket_key: "2026-06-01", date: "2026-06-01", label: "2026-06-01", total_requests: 58235, success_requests: 58040, failed_requests: 195, total_input_tokens: 692456546, total_output_tokens: 45899964, total_tokens: 3657340111 },
            { bucket_key: "2026-06-02", date: "2026-06-02", label: "2026-06-02", total_requests: 75581, success_requests: 75343, failed_requests: 238, total_input_tokens: 511728528, total_output_tokens: 48864365, total_tokens: 3698282278 }
        ];

        // 缩放比例以模拟 1d / 30d 范围变化
        let currentRange = '7d';
        let requestChartInstance = null;
        let modelChartInstance = null;

        // 初始化
        window.addEventListener('DOMContentLoaded', () => {
            initDashboard();
            window.addEventListener('resize', () => {
                requestChartInstance && requestChartInstance.resize();
                modelChartInstance && modelChartInstance.resize();
            });
        });

        // 格式化数字
        function formatNum(value) {
            return Number(value || 0).toLocaleString('zh-CN');
        }

        // 十六进制颜色转 RGBA
        function hexToRgba(hex, alpha = 1) {
            const cleanHex = hex.replace('#', '');
            const r = parseInt(cleanHex.substring(0, 2), 16);
            const g = parseInt(cleanHex.substring(2, 4), 16);
            const b = parseInt(cleanHex.substring(4, 6), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        // 初始化仪表盘
        function initDashboard() {
            renderKPIs();
            renderModelRanking();
            renderTable();
            initCharts();
        }

        // 渲染 KPI 数据
        function renderKPIs() {
            let scale = 1;
            if (currentRange === 'today') scale = 0.15;
            if (currentRange === '30d') scale = 4.2;

            document.getElementById('total-users').innerText = formatNum(DASHBOARD_DATA.total_users);
            document.getElementById('enabled-channels').innerText = `${DASHBOARD_DATA.enabled_channels} / ${DASHBOARD_DATA.total_channels}`;
            document.getElementById('total-models').innerText = DASHBOARD_DATA.total_models;
            
            const todayRequests = Math.round(DASHBOARD_DATA.today_requests * scale);
            const todayErrors = Math.round(DASHBOARD_DATA.today_errors * scale);
            const successRate = todayRequests > 0 ? (((todayRequests - todayErrors) / todayRequests) * 100).toFixed(1) : 100;
            const todayTokens = Math.round(DASHBOARD_DATA.today_tokens * scale);

            document.getElementById('today-requests').innerText = formatNum(todayRequests);
            document.getElementById('today-tokens').innerText = formatNum(todayTokens);
            document.getElementById('success-rate').innerText = `${successRate}%`;
            document.getElementById('today-errors').innerText = formatNum(todayErrors);

            // 进度条渲染
            const maxToken = 10000000000;
            const tokenPercent = Math.min((todayTokens / maxToken) * 100, 100).toFixed(1);
            document.getElementById('token-bar').style.width = `${tokenPercent}%`;
            document.getElementById('success-bar').style.width = `${successRate}%`;
            
            const errorPercent = todayRequests > 0 ? ((todayErrors / todayRequests) * 100).toFixed(1) : 0;
            document.getElementById('error-bar').style.width = `${errorPercent}%`;
        }

        // 渲染模型排名
        function renderModelRanking() {
            const rankingList = document.getElementById('ranking-list');
            rankingList.innerHTML = '';
            
            let scale = 1;
            if (currentRange === 'today') scale = 0.15;
            if (currentRange === '30d') scale = 4.2;

            const models = DASHBOARD_DATA.model_usage_ratio
                .filter(m => m.model_name !== '其他')
                .sort((a, b) => b.request_count - a.request_count)
                .slice(0, 5);

            models.forEach((item, index) => {
                const color = MODEL_COLORS[index % MODEL_COLORS.length];
                const count = Math.round(item.request_count * scale);
                const bgLight = hexToRgba(color, 0.08);
                
                const rankHtml = `
                    <div class="ranking-item">
                        <div class="ranking-left">
                            <span class="ranking-index" style="background: ${color}">${index + 1}</span>
                            <span class="ranking-name" title="${item.model_name}">${item.model_name}</span>
                        </div>
                        <div class="ranking-right">
                            <span class="ranking-count" style="color: ${color}; background: ${bgLight}">${formatNum(count)}</span>
                            <span class="ranking-ratio">${item.ratio}%</span>
                        </div>
                    </div>
                `;
                rankingList.insertAdjacentHTML('beforeend', rankHtml);
            });
        }

        // 渲染明细表格
        function renderTable() {
            const tbody = document.getElementById('stats-table-body');
            tbody.innerHTML = '';

            let data = [...STATS_DATA];
            if (currentRange === 'today') {
                // 模拟按小时聚合的今日数据
                data = [];
                const hours = ['02:00', '04:00', '06:00', '08:00', '10:00', '12:00', '14:00', '16:00', '18:00', '20:00', '22:00', '00:00'];
                hours.forEach(hour => {
                    const factor = 0.05 + Math.random() * 0.1;
                    data.push({
                        label: hour,
                        total_requests: Math.round(75464 * factor),
                        success_requests: Math.round(52562 * factor),
                        failed_requests: Math.round(22902 * factor),
                        total_input_tokens: Math.round(510560692 * factor),
                        total_output_tokens: Math.round(48781136 * factor),
                        total_tokens: Math.round(3692589101 * factor)
                    });
                });
            } else if (currentRange === '30d') {
                // 模拟30天的数据
                data = [];
                for(let i = 29; i >= 0; i--) {
                    const d = new Date();
                    d.setDate(d.getDate() - i);
                    const dateStr = d.toISOString().split('T')[0];
                    const randomFactor = 0.7 + Math.random() * 0.6;
                    data.push({
                        label: dateStr,
                        total_requests: Math.round(55000 * randomFactor),
                        success_requests: Math.round(47000 * randomFactor),
                        failed_requests: Math.round(8000 * randomFactor),
                        total_input_tokens: Math.round(500000000 * randomFactor),
                        total_output_tokens: Math.round(40000000 * randomFactor),
                        total_tokens: Math.round(3500000000 * randomFactor)
                    });
                }
            }

            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><span class="badge badge-date">${row.label}</span></td>
                    <td><span class="badge badge-total">${formatNum(row.total_requests)}</span></td>
                    <td><span class="badge badge-success">${formatNum(row.success_requests)}</span></td>
                    <td><span class="badge ${row.failed_requests > 0 ? 'badge-danger' : 'badge-neutral'}">${formatNum(row.failed_requests)}</span></td>
                    <td><span class="badge badge-input">${formatNum(row.total_input_tokens || row.input_tokens)}</span></td>
                    <td><span class="badge badge-output">${formatNum(row.total_output_tokens || row.output_tokens)}</span></td>
                    <td><span class="badge badge-tokens">${formatNum(row.total_tokens)}</span></td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 初始化和配置图表
        function initCharts() {
            // 1. 请求趋势图
            const requestDom = document.getElementById('request-chart');
            requestChartInstance = echarts.init(requestDom);
            
            // 2. 模型比例图
            const modelDom = document.getElementById('model-chart');
            modelChartInstance = echarts.init(modelDom);

            updateCharts();
        }

        function updateCharts() {
            if(!requestChartInstance || !modelChartInstance) return;

            let xData = [];
            let totalReqs = [];
            let successReqs = [];
            let failedReqs = [];

            if (currentRange === '7d') {
                xData = STATS_DATA.map(item => item.label);
                totalReqs = STATS_DATA.map(item => item.total_requests);
                successReqs = STATS_DATA.map(item => item.success_requests);
                failedReqs = STATS_DATA.map(item => item.failed_requests);
            } else if (currentRange === 'today') {
                const rows = Array.from(document.querySelectorAll('#stats-table-body tr')).map(tr => {
                    const badges = tr.querySelectorAll('.badge');
                    return {
                        label: badges[0].innerText,
                        total: parseInt(badges[1].innerText.replace(/,/g, '')),
                        success: parseInt(badges[2].innerText.replace(/,/g, '')),
                        failed: parseInt(badges[3].innerText.replace(/,/g, ''))
                    };
                });
                xData = rows.map(r => r.label);
                totalReqs = rows.map(r => r.total);
                successReqs = rows.map(r => r.success);
                failedReqs = rows.map(r => r.failed);
            } else {
                const rows = Array.from(document.querySelectorAll('#stats-table-body tr')).map(tr => {
                    const badges = tr.querySelectorAll('.badge');
                    return {
                        label: badges[0].innerText.substring(5), // 截取 MM-DD 方便显示
                        total: parseInt(badges[1].innerText.replace(/,/g, '')),
                        success: parseInt(badges[2].innerText.replace(/,/g, '')),
                        failed: parseInt(badges[3].innerText.replace(/,/g, ''))
                    };
                });
                xData = rows.map(r => r.label);
                totalReqs = rows.map(r => r.total);
                successReqs = rows.map(r => r.success);
                failedReqs = rows.map(r => r.failed);
            }

            // 请求趋势图表配置
            requestChartInstance.setOption({
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'shadow' },
                    backgroundColor: 'rgba(255, 255, 255, 0.95)',
                    borderColor: 'rgba(15, 23, 42, 0.08)',
                    textStyle: { color: '#0f172a' }
                },
                legend: {
                    data: ['总请求', '成功', '失败'],
                    textStyle: { color: '#64748b' },
                    top: 0
                },
                grid: {
                    left: '2%',
                    right: '2%',
                    bottom: '5%',
                    top: '12%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: xData,
                    axisLine: { lineStyle: { color: 'rgba(15, 23, 42, 0.08)' } },
                    axisLabel: { color: '#64748b', fontSize: 11 }
                },
                yAxis: {
                    type: 'value',
                    axisLine: { show: false },
                    splitLine: { lineStyle: { color: 'rgba(15, 23, 42, 0.04)' } },
                    axisLabel: { color: '#64748b', fontSize: 11 }
                },
                series: [
                    {
                        name: '总请求',
                        type: 'line',
                        smooth: true,
                        symbolSize: 6,
                        data: totalReqs,
                        itemStyle: { color: '#2563eb' },
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: 'rgba(37, 99, 235, 0.15)' },
                                { offset: 1, color: 'rgba(37, 99, 235, 0.01)' }
                            ])
                        }
                    },
                    {
                        name: '成功',
                        type: 'bar',
                        barMaxWidth: 16,
                        data: successReqs,
                        itemStyle: {
                            color: '#10b981',
                            borderRadius: [4, 4, 0, 0]
                        }
                    },
                    {
                        name: '失败',
                        type: 'bar',
                        barMaxWidth: 16,
                        data: failedReqs,
                        itemStyle: {
                            color: '#ef4444',
                            borderRadius: [4, 4, 0, 0]
                        }
                    }
                ]
            }, true);

            // 模型占比饼图配置
            let scale = 1;
            if (currentRange === 'today') scale = 0.15;
            if (currentRange === '30d') scale = 4.2;

            const pieData = DASHBOARD_DATA.model_usage_ratio.map((item, index) => ({
                value: Math.round(item.request_count * scale),
                name: item.model_name,
                ratio: item.ratio
            }));

            modelChartInstance.setOption({
                backgroundColor: 'transparent',
                color: MODEL_COLORS,
                tooltip: {
                    trigger: 'item',
                    backgroundColor: 'rgba(255, 255, 255, 0.95)',
                    borderColor: 'rgba(15, 23, 42, 0.08)',
                    textStyle: { color: '#0f172a' },
                    formatter: function(params) {
                        return `${params.marker} <b>${params.name}</b><br/>调用数：${formatNum(params.value)}<br/>占比：${params.data.ratio}%`;
                    }
                },
                series: [
                    {
                        type: 'pie',
                        radius: ['45%', '80%'],
                        center: ['50%', '50%'],
                        avoidLabelOverlap: false,
                        itemStyle: {
                            borderColor: '#f1f5f9',
                            borderWidth: 2,
                            borderRadius: 6
                        },
                        label: { show: false },
                        labelLine: { show: false },
                        data: pieData
                    }
                ]
            }, true);
        }

        // 切换时间范围
        function switchRange(range) {
            if (currentRange === range) return;
            currentRange = range;

            // 更新按钮状态
            const buttons = document.querySelectorAll('.range-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // 重新更新标题和副标题
            const rangeLabels = { 'today': '今日', '7d': '近 7 天', '30d': '近 30 天' };
            document.getElementById('trend-title').innerText = `请求趋势（${rangeLabels[range]}）`;
            
            const subtitleLabels = { 
                'today': '按当天每 2 小时聚合统计', 
                '7d': '按近 7 天每日聚合统计', 
                '30d': '按近 30 天每日聚合统计' 
            };
            document.getElementById('table-subtitle').innerText = subtitleLabels[range];

            // 触发刷新重绘
            triggerRefresh();
        }

        // 模拟数据重新加载
        function triggerRefresh() {
            const refreshIcon = document.querySelector('.refresh-btn i');
            refreshIcon.classList.add('fa-spin');
            
            setTimeout(() => {
                renderKPIs();
                renderModelRanking();
                renderTable();
                updateCharts();
                refreshIcon.classList.remove('fa-spin');
            }, 500);
        }
    </script>
</body>
</html>
