# 代理 API 子域名模板
#
# 使用方式：
# 1. 将 {agent_api_domain} 替换为代理 API 域名，例如 happy-api.xiaoleai.team
# 2. 将证书路径替换为对应域名证书
# 3. 所有代理 API 域名都回源到同一个 FastAPI 服务

server {
    listen 80;
    server_name {agent_api_domain};
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name {agent_api_domain};

    ssl_certificate /etc/letsencrypt/live/{agent_api_domain}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/{agent_api_domain}/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8085;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location /health {
        proxy_pass http://127.0.0.1:8085/health;
        access_log off;
    }
}
