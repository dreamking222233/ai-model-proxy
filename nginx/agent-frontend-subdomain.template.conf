# 代理前台子域名模板
#
# 使用方式：
# 1. 将 {agent_frontend_domain} 替换为代理前台域名，例如 happy.xiaoleai.team
# 2. 将证书路径替换为对应域名证书
# 3. 所有代理前台可共用同一套 frontend/dist 构建产物

server {
    listen 80;
    server_name {agent_frontend_domain};
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name {agent_frontend_domain};

    ssl_certificate /etc/letsencrypt/live/{agent_frontend_domain}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/{agent_frontend_domain}/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    root /root/ai-model-proxy-platform/frontend/dist;
    index index.html;

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
