# 根域名跳转到 www
server {
    listen 80;
    server_name xiaoleai.team;
    return 301 https://www.xiaoleai.team$request_uri;
}

server {
    listen 443 ssl http2;
    server_name xiaoleai.team;
    server_tokens off;

    ssl_certificate /root/ssl/xiaoleai.team_nginx/xiaoleai.team_bundle.crt;
    ssl_certificate_key /root/ssl/xiaoleai.team_nginx/xiaoleai.team.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    return 301 https://www.xiaoleai.team$request_uri;
}

# www + 通配代理前台配置
server {
    listen 80;
    server_name www.xiaoleai.team *.xiaoleai.team;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.xiaoleai.team *.xiaoleai.team;
    server_tokens off;

    ssl_certificate /root/ssl/xiaoleai.team_nginx/xiaoleai.team_bundle.crt;
    ssl_certificate_key /root/ssl/xiaoleai.team_nginx/xiaoleai.team.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    client_max_body_size 100M;

    location ~* \.map$ {
        return 404;
    }

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }
}
